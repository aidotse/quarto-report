# Renders the dual-format report and deploys the HTML site to GitHub Pages.
#
#   - Pull requests            -> `test-build` job only (the gate; no deploy).
#   - Pushes to `main`         -> `test-build`, then `deploy` to GitHub Pages.
#
# Assumes this template is the repository root. For the deploy to work, enable
# Pages with "GitHub Actions" as the source (Settings -> Pages -> Build and
# deployment -> Source: GitHub Actions). To make the gate binding, require the
# `test-build` status check in branch protection for `main` (see README).
name: Render report

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default; the deploy job widens this for itself.
permissions:
  contents: read

jobs:
  test-build:
    name: test-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Check formatting (Panache)
        run: uvx --from panache-cli==2.61.0 panache format --check .

      - name: Set up Quarto (bundles Typst)
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render both formats + assert invariants
        run: bash test/render-test.sh

  deploy:
    # Only on pushes to main, and only after the gate passes.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write        # publish to Pages
      id-token: write     # OIDC token for deploy-pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Serialize deploys; don't cancel an in-flight publish.
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5

      - name: Set up Quarto (bundles Typst)
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render all formats to _site/
        run: quarto render

      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
