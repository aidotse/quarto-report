# Panache — Pandoc/Quarto-aware Markdown formatter + linter (https://panache.bz)
# Governs source formatting for .qmd / .md. Enforced via the pre-commit hook
# (.pre-commit-config.yaml) and runnable manually: `panache format .`
#
# Why Panache and not mdformat/Prettier: those are CommonMark tools that corrupt
# Quarto syntax (escaping $…$ math, rewriting ::: fences, mangling raw {=typst}
# blocks). Panache parses the Pandoc/Quarto CST and is render-safe.

flavor = "quarto"
line-width = 120

[format]
# "reflow" = fill prose to line-width (mdformat-style). Produces one canonical
# wrapping regardless of how the source was broken — normalizes inconsistent
# line-breaking. (Alternatives: "semantic" one-sentence-per-line but preserves
# existing breaks; "preserve" leaves wrapping untouched.)
wrap = "reflow"
